networks:
  traefik:
    external: true

# The registration key lives in a compose secret. config/dday_ed25519 must exist
# (run `make keys`) and is gitignored — it is never committed nor baked into the
# image. Compose mounts it read-only at /run/secrets/age_key (mode 0444), so the
# distroless nonroot process (uid 65532) can read it without a host-side chown.
secrets:
  age_key:
    file: ./config/dday_ed25519

volumes:
  # Persists the SQLite DB across restarts/redeploys. The image ships /data owned
  # by nonroot (65532), so this fresh named volume inherits writable ownership.
  dday-data:

services:
  dday:
    networks:
      - traefik
    labels:
        traefik.http.routers.dday.rule: "Host(`dday.hs-ldz.pl`)"
        traefik.http.routers.dday.entrypoints: "websecure"
        traefik.http.routers.dday.tls.certresolver: "myresolver"
    expose:
      - "3329"
    restart: unless-stopped
    build: .
    secrets:
      - age_key
    volumes:
      - dday-data:/data
    environment:
      # Private age key (decrypts registration tokens); see secrets: above.
      AGE_KEY: /run/secrets/age_key
      # SQLite DB path on the persistent volume.
      DB_PATH: /data/dday.db
      # Force registration open NOW. Remove this line in production so the built-in
      # time gate applies (opens 2026-07-26 15:00 Europe/Warsaw).
      REGISTRATION_OPEN: "1"
