networks:
  traefik:
    external: true

services:
  dday:
    networks:
      - traefik
    labels:
        traefik.http.routers.dday.rule: "Host(`dday.hs-ldz.pl`)"
        traefik.http.routers.dday.entrypoints: "websecure"
        traefik.http.routers.dday.tls.certresolver: "myresolver"
    expose:
      - "3329"
    restart: unless-stopped
    build: .
